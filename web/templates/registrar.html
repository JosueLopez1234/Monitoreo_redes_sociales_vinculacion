{% extends 'base.html' %}

{% block title %}
Registrar Seguidores
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card dashboard-card shadow-sm">

                <div class="card-body p-5">

                    <div
                        class="d-flex justify-content-between align-items-center mb-4">

                        <div>

                            <h2 class="mb-1">

                                Registrar Seguidores

                            </h2>

                            <p class="text-muted mb-0">

                                Registre el monitoreo de una red social.

                            </p>

                        </div>

                        <i
                            class="bi bi-bar-chart-line-fill display-5 text-success"></i>

                    </div>

                    <hr>

                    <form method="POST">

                        <div class="mb-4">

                            <label class="form-label fw-semibold">

                                Red Social

                            </label>

                            <select
                                class="form-select"
                                name="red_social"
                                required>

                                {% for red in redes %}

                                <option value="{{ red }}">

                                    {{ red }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-4">

                                <label class="form-label fw-semibold">

                                    Agropecuaria

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="agropecuaria"
                                    min="0"
                                    placeholder="Ej: 3022"
                                    required>

                            </div>

                            <div class="col-md-4 mb-4">

                                <label class="form-label fw-semibold">

                                    Agronegocios

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="agronegocios"
                                    min="0"
                                    placeholder="Ej: 1635"
                                    required>

                            </div>

                            <div class="col-md-4 mb-4">

                                <label class="form-label fw-semibold">

                                    Agroindustrial

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="agroindustrial"
                                    min="0"
                                    placeholder="Ej: 200"
                                    required>

                            </div>

                        </div>

                        <div class="alert alert-info mt-4">

                            <i class="bi bi-info-circle-fill"></i>

                            La fecha y la hora se registran automáticamente.

                        </div>

                        <div class="d-flex justify-content-end mt-4">

                            <button
                                type="reset"
                                class="btn btn-outline-secondary me-2">

                                <i class="bi bi-eraser"></i>

                                Limpiar

                            </button>

                            <button
                                type="submit"
                                class="btn btn-success">

                                <i class="bi bi-check-circle-fill"></i>

                                Guardar Registro

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
