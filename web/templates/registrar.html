{% extends 'base.html' %}

{% block title %}
Registrar Seguidores
{% endblock %}

{% block content %}

<div class="container-fluid">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card dashboard-card">

                <div class="card-body p-5">

                    <h2 class="mb-2">

                        Registrar Seguidores

                    </h2>

                    <p class="text-muted mb-4">

                        Ingrese el monitoreo correspondiente a una red social.

                    </p>

                    <form method="POST">

                        <div class="mb-4">

                            <label class="form-label">

                                Red Social

                            </label>

                            <select
                                class="form-select"
                                name="red_social"
                                required>

                                {% for red in redes %}

                                <option value="{{ red }}">

                                    {{ red }}

                                </option>

                                {% endfor %}

                            </select>

                        </div>

                        <div class="row">

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Agropecuaria

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="agropecuaria"
                                    required>

                            </div>

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Agronegocios

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="agronegocios"
                                    required>

                            </div>

                            <div class="col-md-4 mb-4">

                                <label class="form-label">

                                    Agroindustrial

                                </label>

                                <input
                                    type="number"
                                    class="form-control"
                                    name="agroindustrial"
                                    required>

                            </div>

                        </div>

                        <div class="text-end">

                            <button
                                type="submit"
                                class="btn btn-success">

                                Guardar Registro

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
